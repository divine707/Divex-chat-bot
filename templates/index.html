<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ username }}'s Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #1B1F2A;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #E8E6DF;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #2E3444;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge {
    width: 36px; height: 36px; border-radius: 8px;
    background: #4FB0A5;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; color: #1B1F2A;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    margin: 0;
  }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6B7280;
    margin-top: 2px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .msg { max-width: 78%; padding: 12px 16px; border-radius: 10px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #2E3444; }
  .msg.bot { align-self: flex-start; border-left: 2px dashed #4FB0A5; padding-left: 14px; }
  form {
    padding: 16px 24px 24px;
    border-top: 1px solid #2E3444;
    display: flex;
    gap: 10px;
  }
  textarea {
    flex: 1;
    resize: none;
    background: #232838;
    border: 1px solid #2E3444;
    border-radius: 10px;
    padding: 12px 14px;
    color: #E8E6DF;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    outline: none;
  }
  button {
    width: 42px; height: 42px; border-radius: 10px; border: none;
    background: #4FB0A5; color: #1B1F2A; cursor: pointer; font-size: 18px;
  }
  button:disabled { background: #2E3444; color: #6B7280; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="badge">{{ username[0]|upper }}</div>
    <div>
      <h1>{{ username }}'s Chatbot</h1>
      <div class="subtitle" id="status">on the line</div>
    </div>
  </header>

  <div id="messages"></div>

  <form id="chat-form">
    <textarea id="input" rows="1" placeholder="Write your message…"></textarea>
    <button type="submit" id="send-btn">➤</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('input');
  const status = document.getElementById('status');

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  addMessage("Hello {{ username }}. I'm listening — what's on your mind?", 'bot');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    status.textContent = 'composing a reply…';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      addMessage(data.reply, 'bot');
    } catch (err) {
      addMessage("Something interrupted the line. Try again.", 'bot');
    } finally {
      status.textContent = 'on the line';
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });
</script>
</body>
  </html>
